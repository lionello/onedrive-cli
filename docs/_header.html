<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>onedrive-cli — a command line for OneDrive</title>
<meta name="description" content="Cross-platform command line interface for OneDrive (Personal). cat, cp, ls, find, grep, mcp and more — right from your terminal." />
<meta name="color-scheme" content="dark" />
<meta property="og:title" content="onedrive-cli" />
<meta property="og:description" content="A cross-platform command line for OneDrive (Personal)." />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0c11;
    --bg-2: #0d1017;
    --surface: #12161f;
    --surface-2: #161b26;
    --border: rgba(255, 255, 255, 0.09);
    --border-strong: rgba(255, 255, 255, 0.16);
    --text: #d7dce6;
    --heading: #f2f5fa;
    --muted: #8b93a3;
    --faint: #626a79;
    --cyan: #45d6e0;
    --blue: #4d9dff;
    --green: #56e08a;
    --amber: #f5c26b;
    --pink: #f871a0;
    --glow: rgba(69, 214, 224, 0.5);
    --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
    --display: "Bricolage Grotesque", "Segoe UI", system-ui, sans-serif;
    --maxw: 940px;
  }

  * { box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    margin: 0;
    font-family: var(--mono);
    font-size: 15px;
    line-height: 1.72;
    color: var(--text);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }

  /* Atmosphere: gradient mesh + grid + grain */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: -2;
    background:
      radial-gradient(60% 55% at 78% -5%, rgba(77, 157, 255, 0.18), transparent 60%),
      radial-gradient(50% 50% at 10% 0%, rgba(69, 214, 224, 0.16), transparent 55%),
      radial-gradient(70% 60% at 50% 110%, rgba(88, 224, 138, 0.07), transparent 60%),
      linear-gradient(180deg, var(--bg), var(--bg-2));
  }
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(255, 255, 255, 0.022) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.022) 1px, transparent 1px);
    background-size: 46px 46px;
    mask-image: radial-gradient(120% 90% at 50% 0%, #000 30%, transparent 85%);
    -webkit-mask-image: radial-gradient(120% 90% at 50% 0%, #000 30%, transparent 85%);
  }

  ::selection { background: rgba(69, 214, 224, 0.28); color: #fff; }

  /* ── Nav ─────────────────────────────────────────── */
  .nav {
    position: sticky;
    top: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 14px clamp(18px, 5vw, 40px);
    background: rgba(10, 12, 17, 0.72);
    backdrop-filter: blur(14px) saturate(1.4);
    -webkit-backdrop-filter: blur(14px) saturate(1.4);
    border-bottom: 1px solid var(--border);
  }
  .nav__brand {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--heading);
    text-decoration: none;
    font-size: 15px;
  }
  .nav__brand .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 12px var(--green);
    animation: pulse 2.6s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  .nav__brand b { color: var(--cyan); }
  .nav__spacer { flex: 1; }
  .nav__link {
    color: var(--muted);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    transition: color 0.18s ease;
  }
  .nav__link:hover { color: var(--heading); }
  .nav__cta {
    color: var(--bg);
    background: linear-gradient(135deg, var(--cyan), var(--blue));
    padding: 7px 15px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    text-decoration: none;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    box-shadow: 0 4px 20px rgba(77, 157, 255, 0.25);
  }
  .nav__cta:hover { transform: translateY(-1px); box-shadow: 0 6px 26px rgba(77, 157, 255, 0.4); }
  @media (max-width: 620px) {
    .nav { padding: 12px 16px; gap: 12px; }
    .nav__link.hide-sm { display: none; }
    .nav__cta { padding: 7px 12px; }
  }

  /* ── Doc wrapper ─────────────────────────────────── */
  .doc {
    max-width: var(--maxw);
    margin: 0 auto;
    padding: 0 clamp(18px, 5vw, 40px) 120px;
  }

  /* Hero: first h1 + tagline */
  .doc > h1:first-child {
    font-family: var(--display);
    font-size: clamp(3rem, 11vw, 6.4rem);
    line-height: 0.94;
    font-weight: 800;
    letter-spacing: -0.045em;
    margin: clamp(60px, 12vh, 130px) 0 0;
    color: var(--heading);
    background: linear-gradient(120deg, #fff 20%, var(--cyan) 62%, var(--blue) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: rise 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  .doc > h1:first-child::after {
    content: "_";
    -webkit-text-fill-color: var(--cyan);
    color: var(--cyan);
    animation: blink 1.15s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  /* tagline = first paragraph */
  .doc > h1:first-child + p {
    font-size: clamp(1.05rem, 2.6vw, 1.4rem);
    color: var(--muted);
    max-width: 34ch;
    margin: 22px 0 30px;
    line-height: 1.5;
    animation: rise 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.08s both;
  }
  /* hero action row injected after tagline */
  .hero-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin: 0 0 30px;
    animation: rise 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.16s both;
  }
  .hero-actions .btn {
    display: inline-flex; align-items: center; gap: 9px;
    text-decoration: none; font-weight: 700; font-size: 14px;
    padding: 12px 20px; border-radius: 10px;
    transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
  }
  .hero-actions .btn--primary {
    color: var(--bg);
    background: linear-gradient(135deg, var(--cyan), var(--blue));
    box-shadow: 0 8px 30px rgba(77, 157, 255, 0.3);
  }
  .hero-actions .btn--primary:hover { transform: translateY(-2px); box-shadow: 0 12px 38px rgba(77, 157, 255, 0.45); }
  .hero-actions .btn--ghost {
    color: var(--text);
    border: 1px solid var(--border-strong);
    background: rgba(255, 255, 255, 0.02);
  }
  .hero-actions .btn--ghost:hover { transform: translateY(-2px); border-color: var(--cyan); color: var(--heading); }

  @keyframes rise { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: none; } }

  /* ── Headings ────────────────────────────────────── */
  .doc h2 {
    font-family: var(--display);
    font-size: clamp(1.5rem, 4vw, 2.05rem);
    font-weight: 700;
    letter-spacing: -0.025em;
    color: var(--heading);
    margin: 84px 0 8px;
    padding-top: 30px;
    border-top: 1px solid var(--border);
    scroll-margin-top: 80px;
  }
  .doc h2::before {
    content: "// ";
    color: var(--cyan);
    font-family: var(--mono);
    font-weight: 700;
    font-size: 0.7em;
    opacity: 0.85;
  }
  .doc h3 {
    font-family: var(--display);
    font-size: 1.2rem;
    font-weight: 600;
    color: var(--heading);
    margin: 40px 0 6px;
    letter-spacing: -0.01em;
  }
  /* h5 used for examples & FAQ — render as labelled cards */
  .doc h5 {
    font-family: var(--mono);
    font-size: 0.94rem;
    font-weight: 600;
    color: var(--heading);
    margin: 26px 0 0;
    padding: 16px 18px;
    background: linear-gradient(180deg, var(--surface-2), var(--surface));
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 12px 12px 0 0;
    line-height: 1.45;
    position: relative;
    padding-left: 44px;
  }
  .doc h5::before {
    content: ">";
    position: absolute;
    left: 16px; top: 15px;
    width: 20px; height: 20px;
    display: grid; place-items: center;
    font-size: 13px; font-weight: 800;
    color: var(--bg);
    background: var(--green);
    border-radius: 6px;
  }
  /* a code/paragraph immediately after an h5 closes the card */
  .doc h5 + p {
    margin-top: 0;
    padding: 14px 18px 18px;
    background: rgba(255, 255, 255, 0.015);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 12px 12px;
    color: var(--muted);
  }
  /* a standalone command inside an example/FAQ card → command line */
  .doc h5 + p > code:only-child {
    display: block;
    background: var(--surface);
    border: 1px solid var(--border);
    color: #cfe3ec;
    padding: 12px 14px 12px 30px;
    border-radius: 9px;
    position: relative;
    line-height: 1.7;
    overflow-wrap: anywhere;
  }
  .doc h5 + p > code:only-child::before {
    content: "$";
    position: absolute;
    left: 13px; top: 12px;
    color: var(--green);
    font-weight: 700;
  }
  .doc h5 + p code { color: var(--cyan); }

  /* ── Text ────────────────────────────────────────── */
  .doc p { margin: 16px 0; }
  .doc a { color: var(--cyan); text-decoration: none; border-bottom: 1px solid rgba(69, 214, 224, 0.3); transition: border-color 0.16s ease, color 0.16s ease; }
  .doc a:hover { color: #fff; border-color: var(--cyan); }
  .doc em { color: var(--amber); font-style: normal; }

  /* Inline code */
  .doc code {
    font-family: var(--mono);
    font-size: 0.86em;
    background: rgba(69, 214, 224, 0.1);
    color: var(--cyan);
    padding: 2px 7px;
    border-radius: 6px;
    border: 1px solid rgba(69, 214, 224, 0.16);
    overflow-wrap: anywhere;
  }

  /* ── Code blocks → terminal cards ────────────────── */
  .doc pre {
    position: relative;
    margin: 20px 0;
    padding: 44px 20px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow-x: auto;
    box-shadow: 0 20px 50px -30px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.03);
  }
  .doc pre::before {
    content: "";
    position: absolute;
    top: 16px; left: 18px;
    width: 11px; height: 11px; border-radius: 50%;
    background: #ff5f57;
    box-shadow: 19px 0 #febc2e, 38px 0 #28c840;
  }
  .doc pre::after {
    content: "terminal";
    position: absolute;
    top: 13px; right: 18px;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--faint);
  }
  .doc pre code {
    background: none;
    border: none;
    padding: 0;
    color: #cfe3ec;
    font-size: 13.5px;
    line-height: 1.85;
    white-space: pre;
    display: block;
  }
  /* copy button injected by JS */
  .copy-btn {
    position: absolute;
    top: 34px; right: 12px;
    z-index: 2;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 4px 10px;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.16s ease, color 0.16s ease, border-color 0.16s ease;
  }
  .doc pre:hover .copy-btn { opacity: 1; }
  .copy-btn:hover { color: var(--cyan); border-color: var(--cyan); }
  .copy-btn.copied { color: var(--green); border-color: var(--green); }

  /* ── Lists ───────────────────────────────────────── */
  .doc ul {
    list-style: none;
    padding: 0;
    margin: 20px 0;
    display: grid;
    gap: 8px;
  }
  /* command-style lists (li starts with code): 2-col grid on wide screens */
  .doc ul:has(li > code:first-child) {
    grid-template-columns: repeat(auto-fill, minmax(min(100%, 320px), 1fr));
  }
  .doc ul li {
    position: relative;
    padding: 11px 15px 11px 15px;
    background: rgba(255, 255, 255, 0.018);
    border: 1px solid var(--border);
    border-radius: 10px;
    line-height: 1.5;
    color: var(--muted);
    transition: border-color 0.16s ease, background 0.16s ease, transform 0.16s ease;
  }
  .doc ul li:hover { border-color: var(--border-strong); background: rgba(255, 255, 255, 0.035); }
  .doc ul li > code:first-child {
    background: none;
    border: none;
    padding: 0;
    margin-right: 4px;
    color: var(--green);
    font-weight: 700;
    white-space: nowrap;
  }
  .doc ol { padding-left: 20px; }

  /* footer */
  .site-footer {
    max-width: var(--maxw);
    margin: 0 auto;
    padding: 40px clamp(18px, 5vw, 40px) 70px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 14px 26px;
    align-items: center;
    color: var(--faint);
    font-size: 13px;
  }
  .site-footer a { color: var(--muted); text-decoration: none; }
  .site-footer a:hover { color: var(--cyan); }
  .site-footer .prompt { color: var(--green); }
</style>
</head>

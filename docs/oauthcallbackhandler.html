<html>
  <head>
    <title>Simple OAuth2.0 callback handler</title>
    <script>
(function(){

  var textarea;

  function click(e) {

    textarea.setSelectionRange(0, textarea.value.length)
    textarea.focus();
    return document.execCommand('copy');
  }

  function param(source, name) {
    var m = new RegExp('[?#&]' + name + '=([^&]+)').exec(source);
    return m ? decodeURIComponent(m[1]) : null;
  }

  function init() {

    // The token comes back in the fragment; the command name in the query.
    var access_token = param(window.location.hash, 'access_token');
    var cmd = param(window.location.search, 'cmd') || 'onedrive-cli';
    textarea = document.getElementById('token')
    textarea.value = " " + cmd + " login " + access_token;
    textarea.focus();

    document.getElementById('copy').addEventListener('click', click);
  }

  window.addEventListener('load', init);
})();
    </script>
  </head>
  <body>
    <p>Copy-paste this token in the command line:</p>
    <textarea id='token' readonly="readonly" style="height: 20em; width:50%"></textarea>
    <button id='copy'>Copy</button>
  </body>
</html>

<html>
  <head>
    <title>Simple OAuth2.0 callback handler</title>
    <script>
(function(){

  var textarea;

  function click(e) {

    textarea.setSelectionRange(0, textarea.value.length)
    textarea.focus();
    return document.execCommand('copy');
  }

  function fromHash(name) {
    var m = new RegExp('[#&]' + name + '=([^&]+)').exec(window.location.hash);
    return m ? decodeURIComponent(m[1]) : null;
  }

  function init() {

    var access_token = fromHash('access_token');
    // The CLI passes its own command name (e.g. 'onedrive') via OAuth `state`.
    var cmd = fromHash('state') || 'onedrive-cli';
    textarea = document.getElementById('token')
    textarea.value = " " + cmd + " login " + access_token;
    textarea.focus();

    document.getElementById('copy').addEventListener('click', click);
  }

  window.addEventListener('load', init);
})();
    </script>
  </head>
  <body>
    <p>Copy-paste this token in the command line:</p>
    <textarea id='token' readonly="readonly" style="height: 20em; width:50%"></textarea>
    <button id='copy'>Copy</button>
  </body>
</html>
